# =============================================================================
# feeds.yaml — source + watch config for the BoomRx Daily News Digest
# Consumed by digest.py (keys: google_news, federal_register, rss, watch)
# Beats are mapped to the BoomRx formulary categories:
#   HRT/TRT · Peptides · GLP-1 / Weight Loss · Sexual Health · Hair Loss ·
#   Skincare (Cosmetic) · Wellness / Anti-Aging · Compounding/FDA · Telehealth
#
# Tuning notes:
#   - Google News queries use quotes to keep phrases together; keep them tight
#     to limit noise. Claude scores relevance 1-5, MIN_SCORE filters the page.
#   - Verify each RSS url returns XML before relying on it (some FDA feeds move).
#   - The `watch` list force-promotes any story matching its keywords to score 5
#     and surfaces it in the standing watch panel even on quiet days.
# =============================================================================

google_news:
  # --- Compounding / FDA regulatory (central to the whole portfolio) ---
  - '"compounding pharmacy" FDA'
  - '"503A" OR "503B" compounding'
  - '"bulks list" compounding FDA'
  - 'Pharmacy Compounding Advisory Committee PCAC'
  - 'compounded drug FDA warning letter'
  - 'Alliance for Pharmacy Compounding'
  - '"demonstrably difficult to compound"'

  # --- GLP-1 / medical weight loss ---
  - 'compounded semaglutide'
  - 'compounded tirzepatide'
  - 'semaglutide tirzepatide 503B bulks list'
  - 'GLP-1 compounding FDA'
  - 'GLP-1 weight loss telehealth FDA'
  - 'liraglutide compounding'
  - 'phentermine weight loss'
  - 'metformin weight loss longevity'

