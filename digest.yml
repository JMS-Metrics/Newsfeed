name: Daily News Digest

on:
  schedule:
    # 11:00 UTC = 7:00 AM Eastern (EDT) / 6:00 AM (EST). Adjust as needed.
    - cron: "0 11 * * *"
  workflow_dispatch: {}        # lets you trigger a run manually from the Actions tab

permissions:
  contents: write              # needed to commit the rendered dashboard back

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_TO:   ${{ secrets.DIGEST_EMAIL_TO }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
          SITE_BASE_URL:     ${{ secrets.SITE_BASE_URL }}
          # Optional tuning:
          # CLAUDE_MODEL: claude-sonnet-4-6
          # MIN_SCORE: "3"
          # MAX_ITEMS: "60"
        run: python digest.py

      - name: Commit dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Daily digest $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
